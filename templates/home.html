<html>
<head>
    <title>Student Score Predictor</title>
</head>

<body style="margin:0; font-family:Arial, sans-serif; background:linear-gradient(135deg,#1f1c2c,#928dab);">

<div style="max-width:750px; margin:40px auto; background:white; padding:30px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.3);">

    <h1 style="text-align:center; color:#333;">Student Score Predictor</h1>

    <p style="text-align:center; color:gray;">
        Predict Writing Score using student academic data
    </p>

    <!-- SINGLE PAGE FORM -->
    <form method="post">

        <!-- Gender -->
        <label>Gender</label>
        <select name="gender" required style="width:100%; padding:10px; margin-bottom:15px;">
            <option value="">Select Gender</option>
            <option value="male" {% if gender == "male" %}selected{% endif %}>Male</option>
            <option value="female" {% if gender == "female" %}selected{% endif %}>Female</option>
        </select>

        <!-- Race -->
        <label>Race / Ethnicity</label>
        <select name="race_ethnicity" required style="width:100%; padding:10px; margin-bottom:15px;">
            <option value="">Select Group</option>
            <option value="group A" {% if race_ethnicity == "group A" %}selected{% endif %}>Group A</option>
            <option value="group B" {% if race_ethnicity == "group B" %}selected{% endif %}>Group B</option>
            <option value="group C" {% if race_ethnicity == "group C" %}selected{% endif %}>Group C</option>
            <option value="group D" {% if race_ethnicity == "group D" %}selected{% endif %}>Group D</option>
            <option value="group E" {% if race_ethnicity == "group E" %}selected{% endif %}>Group E</option>
        </select>

        <!-- Parent Education -->
        <label>Parental Level of Education</label>
        <select name="parental_level_of_education" required style="width:100%; padding:10px; margin-bottom:15px;">
            <option value="">Select Education</option>
            <option value="associate's degree" {% if parental_level_of_education == "associate's degree" %}selected{% endif %}>Associate's degree</option>
            <option value="bachelor's degree" {% if parental_level_of_education == "bachelor's degree" %}selected{% endif %}>Bachelor's degree</option>
            <option value="high school" {% if parental_level_of_education == "high school" %}selected{% endif %}>High school</option>
            <option value="master's degree" {% if parental_level_of_education == "master's degree" %}selected{% endif %}>Master's degree</option>
            <option value="some college" {% if parental_level_of_education == "some college" %}selected{% endif %}>Some college</option>
            <option value="some high school" {% if parental_level_of_education == "some high school" %}selected{% endif %}>Some high school</option>
        </select>

        <!-- Lunch -->
        <label>Lunch Type</label>
        <select name="lunch" required style="width:100%; padding:10px; margin-bottom:15px;">
            <option value="">Select Lunch</option>
            <option value="free/reduced" {% if lunch == "free/reduced" %}selected{% endif %}>Free / Reduced</option>
            <option value="standard" {% if lunch == "standard" %}selected{% endif %}>Standard</option>
        </select>

        <!-- Test Prep -->
        <label>Test Preparation Course</label>
        <select name="test_preparation_course" required style="width:100%; padding:10px; margin-bottom:15px;">
            <option value="">Select Option</option>
            <option value="none" {% if test_preparation_course == "none" %}selected{% endif %}>None</option>
            <option value="completed" {% if test_preparation_course == "completed" %}selected{% endif %}>Completed</option>
        </select>

        <!-- Math Score -->
        <label>Math Score</label>
        <input type="number" name="math_score" min="0" max="100" required
               value="{{ math_score }}"
               style="width:100%; padding:10px; margin-bottom:15px;">

        <!-- Reading Score -->
        <label>Reading Score</label>
        <input type="number" name="reading_score" min="0" max="100" required
               value="{{ reading_score }}"
               style="width:100%; padding:10px; margin-bottom:20px;">

        <!-- Submit -->
        <input type="submit" value="Predict Writing Score"
               style="width:100%; padding:12px; background:#4CAF50; color:white; border:none; border-radius:6px; font-size:16px; cursor:pointer;">
    </form>

    {% if results is not none %}
    <div style="margin-top:25px; padding:15px; background:#e8f5e9; border-left:5px solid #4CAF50; border-radius:6px;">
        <h3 style="margin:0;">Predicted Writing Score: {{ results }}</h3>
    </div>
    {% endif %}

</div>

</body>
</html>
